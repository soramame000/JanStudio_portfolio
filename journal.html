<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />

  <meta name="description" content="JAN STUDIOのジャーナル。撮影レコード、機材レビュー、そして育成への構想。" />
  <link rel="stylesheet" href="assets/css/reset.css?v=2" />
  <link rel="stylesheet" href="assets/css/style.css?v=2" />
  <link rel="stylesheet" href="assets/css/renewal.css?v=2" />
</head>

<body class="page-blog">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">JAN STUDIO</a>
      <nav class="global-nav" aria-label="メインナビゲーション">
        <button class="nav-toggle" aria-expanded="false" aria-controls="global-nav-list">
          <span></span><span></span>
        </button>
        <ul id="global-nav-list">
          <li><a href="index.html">Top</a></li>
          <li><a href="works.html">Works</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="journal.html" aria-current="page">Journal</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="store.html">Store</a></li>
          <li><a href="forge.html">Program</a></li>
          <li><a href="contact.html" class="nav-cta">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero container">
      <p class="page-eyebrow">Journal</p>
      <h1 class="page-title">活動の発信と現場の記録</h1>
      <p class="page-lead">
        現場から得た気づき、機材のレビュー、被写体に向き合う哲学など、JAN STUDIOの舞台裏と未来への構想を綴ります。
      </p>
    </section>

    <!-- NEW: Journal categories -->
    <section class="section" style="padding-top: 0;">
      <div class="container">
        <div class="filter-group" style="margin-bottom: 32px;" aria-label="カテゴリで絞り込み">
          <button class="filter-btn is-active" data-cat="all">すべて</button>
          <button class="filter-btn" data-cat="SHOOT">SHOOT (撮影)</button>
          <button class="filter-btn" data-cat="EQUIP">EQUIP (機材)</button>
          <button class="filter-btn" data-cat="FORGE">FORGE (育成)</button>
          <button class="filter-btn" data-cat="STUDIO">STUDIO</button>
        </div>

        <div class="blog-list" id="blog-list" aria-live="polite">
          <!-- CMSから取得した記事をJavaScriptで描画 -->
        </div>

        <div class="pagination" id="pagination" style="margin-top: 40px; display: flex; gap: 8px; justify-content: center;">
          <!-- JS Pagination -->
        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="logo-small">JAN STUDIO</span>
        <p class="footer-copy">
          © <span id="footer-year-blog"></span> JAN STUDIO. All rights reserved.
        </p>
      </div>
    </div>
  </footer>

  <a href="contact.html?type=shoot" class="floating-cta" id="floating-cta">撮影を相談する</a>

  <script src="assets/js/config.js?v=2"></script>
  <script src="assets/js/main.js?v=2"></script>
  <script src="assets/js/journal.js?v=2"></script>
  <script>
    const floatingCta = document.getElementById("floating-cta");
    if (floatingCta) {
      window.addEventListener("scroll", () => {
        if (window.scrollY > 500) {
          floatingCta.classList.add("visible");
        } else {
          floatingCta.classList.remove("visible");
        }
      });
    }
  </script>
</body>
</html>
